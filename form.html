<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .st1{
            width: 450px;
            border-bottom: 1px solid grey;
            margin: 20px;
            padding-bottom: 10px;
        }
        .sub {
            width: 450px;
            margin: 20px;
            text-align: center;
        }
        .t1{
            border: 1px solid red;
            width: 100px;
            float: left;
            text-align: right;
        }
    </style>
</head>
<body>
    <form action="#" method="get" enctype="multipart/form-data">
        <fieldset>
            <legend>個人資料一</legend>
            <div class="st1">
                <label for="account1" class="t1">姓名：</label>
                <input type="text" name="account" id="account1" size="10"value="guest">
            </div>
            <div class="st1">
                <label for="" class="t1">性別:</label>
                <input type="radio" name="gender" id="">男
                <input type="radio" name="gender" id="">女
            </div>
            <div class="st1">
                <label for="pwd1" class="t1">密碼：</label>
                <input type="password" id="pwd1" name="pwd" maxlength="6">
            </div>
            <div class="st1">
                <label for="" class="t1">生日:</label>
                <input type="date" name="birth" value="2000-01-01">
            </div>
            <div class="st1">
                <label for="" class="t1">Email:</label>
                <input type="email" name="mail1">
            </div>
        </fieldset>
        <fieldset>
            <legend>地址</legend>
            <div class="st1">
                <label for="" class="t1">縣市</label>
                <select name="add1" id="">
                    <option value="TPE">台北市</option>
                    <option value="NTPC" selected>新北市</option>
                </select>
            </div>
            <div class="st1">
                <label for="" class="t1">完整地址:</label>
                <input type="text" name="add2" size="30">
            </div>
        </fieldset>
        <fieldset>
            <legend>個人資料二</legend>
            <div class="st1">  
                <label for="" class="t1">照片</label>
                <input type="file" name="file1" accept=".jpg,.png">
            </div>
            <div class="st1">
                <label for="" class="t1">興趣:</label> 
                <input type="checkbox" name="hobby" value="movie" id="">電影
                <input type="checkbox" name="hobby" value="music" id="">音樂
                <input type="checkbox" name="hobby" value="sport" id="">運動
                <input type="checkbox" name="hobby" value="travel" id="">旅遊
            </div>
            <div class="st1">
                <label for="comment1" class="t1">意見：</label>
                <textarea name="comment" id="comment1" cols="40" rows="5"></textarea>
            </div>
            <div class="sub">
                <input type="submit" value="送出">
                <input type="reset" value="清除">
            </div>
        </fieldset>

    </form>
</body>
</html>
