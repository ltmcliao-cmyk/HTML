<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>type選取器</title>
    <style>
        h1,h3{color:brown}
        h2{color:orange}
        /* type選取器會把body裡面h2全部套用樣式 */
        /* 要讓h2有不同，必須使用class選取器 */
        /* 可以一次對多個標籤套用相同樣式設定 */
    </style>
</head>
<body>
    <h1>apple</h1>
    <h2>orange</h2>
    <h2>banana</h2>
    <h3>apple2</h3>
</body>
</html>
