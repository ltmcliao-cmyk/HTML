<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .tb1 {
            border: 3px solid blue;
            width: 400px;
            border-collapse: collapse;
        }
        /* border-collapse取消表格間距 */

        td,th {border: 3px solid grey;}
        thead {background-color: blanchedalmond;color: black;}
        tbody {
            text-align: center;
        }
    </style>
</head>
<body>
    <table class="tb1">
        <thead>
            <tr>
                <th colspan="3">合併練習</th>
            </tr>
            <tr>
                <th>c1</th>
                <th>c2</th>
                <th>c3</th>
        </thead>
        <tbody>
            <tr>
                <td>1.1</td>
                <td>1.2</td>
                <td>1.3</td>
            </tr>
                <td>2.1</td>
                <td>2.2</td>
                <td>2.3</td>
            </tr>
                <td>3.1</td>
                <td>3.2</td>
                <td>3.3</td>
            </tr>
        </tbody>
        </tr>    

    </table>

</body>
</html>
